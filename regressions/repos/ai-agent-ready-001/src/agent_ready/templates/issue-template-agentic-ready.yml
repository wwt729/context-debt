# Auto-installed by AgentReady (https://github.com/vb-nattamai/agent-ready)
# Placed at .github/ISSUE_TEMPLATE/agentic-ready.yml in your repo.
#
# This gives contributors a pre-filled form so the trigger title is always
# correct and they can optionally describe what they want generated.
# The workflow only fires when the title contains [agentic-ready].

name: "🤖 AgentReady — Transform this repo"
description: "Generate AI-agent scaffolding files (AGENTS.md, CLAUDE.md, agent-context.json, tools, MCP config)"
title: "[agentic-ready] Transform this repo"
labels:
  - "agentic-ready"
body:
  - type: markdown
    attributes:
      value: |
        ## What this does
        Opening this issue triggers the **AgentReady** automation workflow.
        It will:
        1. Scan your repo (languages, frameworks, build system, entry points)
        2. Generate all AI-agent scaffolding files
        3. Open a PR with everything ready to review
        4. Close this issue automatically with a link to the PR

        > **This issue must be opened in YOUR repo** — not in `agent-ready` itself.
        > The `.github/workflows/agentic-ready.yml` workflow in this repo listens for issues with this title.

        ---

  - type: dropdown
    id: provider
    attributes:
      label: LLM provider
      description: "Which LLM provider to use for analysis and generation."
      options:
        - "anthropic (default — Claude Opus)"
        - "openai (GPT-4)"
        - "google (Gemini)"
        - "groq (Llama 3)"
        - "mistral"
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: What to generate
      description: "Leave as 'Everything' unless you only want specific files."
      options:
        - "Everything (default)"
        - "Agent instructions only (AGENTS.md, CLAUDE.md, system_prompt.md)"
        - "Tools only"
        - "Context map only (agent-context.json)"
        - "Memory schema only"
    validations:
      required: true

  - type: dropdown
    id: force
    attributes:
      label: Overwrite existing files?
      description: "If agentic files already exist, should they be regenerated?"
      options:
        - "No — skip files that already exist (default)"
        - "Yes — overwrite everything"
    validations:
      required: true

  - type: textarea
    id: domain_hints
    attributes:
      label: Domain hints (optional)
      description: |
        Help the transformer understand your domain.
        These won't be used automatically — paste them into `agent-context.json` after the PR is opened.
      placeholder: |
        Entry point: src/main/java/com/example/Application.java
        Test command: mvn test
        Key domain concepts:
          - Frame: a single bowling turn (1-2 rolls)
          - Strike: all 10 pins on first roll
          - Spare: all 10 pins across 2 rolls
        Paths agents must NOT write to:
          - src/main/resources/db/migration
        Environment variables:
          - DATABASE_URL
          - API_KEY
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: "I am opening this issue in my own repo (not in `vb-nattamai/agent-ready`)"
          required: true
        - label: "`.github/workflows/agentic-ready.yml` exists in this repo"
          required: true
        - label: "I understand a PR will be opened automatically — no files are written to `main` without a merge"
          required: false
