name: Agentic Ready
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      provider:
        description: 'LLM provider (anthropic | openai | google | groq | mistral)'
        required: false
        default: 'anthropic'
        type: string
      fail_level:
        description: 'Fail if eval pass rate is below this (0.0–1.0, default 0.5)'
        required: false
        default: '0.5'
        type: string
      force:
        description: 'Overwrite existing scaffolding files'
        required: false
        default: false
        type: boolean

env:
  # Override this variable in your repo settings → Actions → Variables
  # to switch providers without editing this file.
  # Valid values: anthropic | openai | google | groq | mistral
  AGENT_READY_PROVIDER: ${{ vars.AGENT_READY_PROVIDER || 'anthropic' }}

jobs:
  check-permission:
    if: contains(github.event.issue.labels.*.name, 'agentic-ready')
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check actor is a repo collaborator
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            const allowed = ['admin', 'write', 'maintain'];
            if (!allowed.includes(perm.permission)) {
              core.setFailed(`@${context.actor} does not have write access. Skipped.`);
              core.setOutput('allowed', 'false');
            } else {
              core.setOutput('allowed', 'true');
            }
  transform:
    needs: check-permission
    if: needs.check-permission.outputs.allowed == 'true'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: vb-nattamai/agent-ready/.github/workflows/reusable-transformer.yml@main
    with:
      target_repo: ${{ github.repository }}
      target_branch: ${{ github.event.repository.default_branch }}
      issue_number: ${{ github.event.issue.number }}
      provider: ${{ inputs.provider || vars.AGENT_READY_PROVIDER || 'anthropic' }}
      eval: true
      fail_level: ${{ inputs.fail_level || '0.5' }}
      force: ${{ inputs.force || false }}
      only: ''
    secrets: inherit