# Auto-installed by AgentReady (https://github.com/vb-nattamai/agent-ready)
#
# PURPOSE: AI-powered code review on every pull request, grounded in the
#          repository's agent-context.json for architecture-aware decisions.
#
# TRIGGER: Runs on every PR opened, updated, or re-opened.
#
# WHAT IT DOES:
#   1. Reads agent-context.json (architecture, restricted paths, pitfalls)
#   2. Fetches the PR diff via gh CLI
#   3. Uses LLM to produce a structured APPROVE / REQUEST_CHANGES verdict
#   4. Posts the review directly to the pull request
#
# REQUIRES: ANTHROPIC_API_KEY secret in this repository.
#           INSTALL_TOKEN (optional) — only needed to read private agent-ready.
#
# SECURITY: pull_request_target ensures the review script always runs from the
#           base branch (never from untrusted PR code) while keeping secret access.

name: AgentReady - PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Checkout agent-ready transformer
        uses: actions/checkout@v4
        with:
          repository: vb-nattamai/agent-ready
          token: ${{ secrets.INSTALL_TOKEN || github.token }}
          path: .agent-ready

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e './.agent-ready[ai]' -q

      - name: Review PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python .agent-ready/src/agent_ready/cli.py \
            --target . \
            --review-pr "$PR_NUMBER" \
            --quiet
        continue-on-error: true
